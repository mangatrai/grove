  /reports/cash-summary:
    get:
      tags: [reports]
      summary: Cash summary / KPIs
      description: >-
        Response is cached client-side in localStorage under scope 'dashboard' (TTL 7 days,
        invalidated on version-counter bump). See docs/CACHING.md for full design.
      x-cache-scope: dashboard
      security: [{ bearerAuth: [] }]
  /reports/balance-sheet:
    get:
      tags: [reports]
      summary: Balance sheet / net worth snapshot (optional ownerScope filters by account belongs-to)
      description: >-
        Assets: checking, savings, investment, retirement, health, education. Liabilities: credit_card, loan.
        Property market values (latest snapshot ≤ asOf) are included in asset totals and in the `properties` array.
        Liability balances stored as positive magnitudes (what you owe); netWorth = assetSum − liabilitySum.
        Statement-ending balances auto-persisted from bank parsers (OFX, BoA CSV/PDF, Marcus PDF, Wealthfront PDF).
      security: [{ bearerAuth: [] }]
      parameters:
        - name: asOf
          in: query
          required: false
          schema: { type: string, format: date }
        - name: ownerScope
          in: query
          required: false
          schema: { type: string, enum: [household, person] }
        - name: ownerPersonProfileId
          in: query
          required: false
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Snapshot rows and totals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceSheetSnapshotResponse'
        "400":
          description: Invalid query (e.g. ownerScope=person without ownerPersonProfileId)
