openapi: 3.1.0
info:
  title: Grove API
  version: 3.0.0
  description: |
    HTTP API for the self-hosted Grove app. All authenticated routes expect
    `Authorization: Bearer <JWT>` unless noted. See `docs/API_INDEX.md` for prose topic guides.
servers:
  - url: /
    description: Relative to configured API base URL
tags:
  - name: health
  - name: auth
  - name: household
  - name: categories
  - name: imports
  - name: transactions
  - name: resolution
  - name: reports
  - name: payslips
  - name: exports
  - name: budget
  - name: recurring
  - name: insights
  - name: gdrive
  - name: protest
paths:
  /health:
    get:
      tags: [health]
      summary: Liveness / readiness
      responses:
        "200":
          description: OK
  /auth/login:
    post:
      tags: [auth]
      summary: Obtain JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                type: object
                required: [token, forcePasswordChange]
                properties:
                  token:
                    type: string
                  forcePasswordChange:
                    type: boolean
                    description: When true, client should send the user through forced password reset before normal app use.
        "401":
          description: Invalid credentials
  /auth/me:
    get:
      tags: [auth]
      summary: Current user and role
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: User payload
        "401":
          description: Unauthorized
  /auth/setup-forced-change-token:
    post:
      tags: [auth]
      summary: Issue reset token for forced password change (signed-in users only)
      description: |
        When `force_password_change` is true for the authenticated user, creates a short-lived
        password reset token (same mechanism as forgot-password) and returns the raw token so the
        client can redirect to the reset-password UI. Returns 403 if no forced change is pending.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Raw one-time reset token (use with POST /auth/reset-password)
          content:
            application/json:
              schema:
                type: object
                required: [token]
                properties:
                  token:
                    type: string
                    minLength: 1
        "401":
          description: Unauthorized
        "403":
          description: User does not have a forced password change pending
          content:
            application/json:
              schema:
                type: object
                required: [code, message]
                properties:
                  code:
                    type: string
                    enum: [NOT_FORCED]
                  message:
                    type: string
                    example: No forced password change pending.
  /auth/capabilities:
    get:
      tags: [auth]
      summary: Public auth feature capabilities
      responses:
        "200":
          description: Capability flags
          content:
            application/json:
              schema:
                type: object
                required: [emailEnabled]
                properties:
                  emailEnabled: { type: boolean }
  /auth/forgot-password:
    post:
      tags: [auth]
      summary: Request a password reset link (always responds 200)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          description: Generic success response (same for known/unknown email)
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    example: If that address is registered, a reset link is on its way.
        "400":
          description: Validation failure (`{ errors: z.issues }`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
  /auth/reset-password:
    post:
      tags: [auth]
      summary: Reset password using one-time token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                  minLength: 1
                newPassword:
                  type: string
                  minLength: 12
                  pattern: ^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z\d]).{12,}$
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message: { type: string, example: Password updated. Please sign in. }
        "400":
          description: Invalid/expired token, same password, or validation error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthResetInvalidTokenResponse'
                  - $ref: '#/components/schemas/AuthResetSameAsCurrentResponse'
                  - $ref: '#/components/schemas/ValidationErrorsResponse'
  /auth/change-password:
    post:
      tags: [auth]
      summary: Change password for signed-in user. Requires uppercase+lowercase+digit+special char, min 10 chars.
      security: [{ bearerAuth: [] }]
  /auth/logout:
    post:
      tags: [auth]
      summary: Invalidate all existing JWTs for the current user (increments token_version). Returns 204.
      security: [{ bearerAuth: [] }]
  /household/settings:
    get:
      tags: [household]
      summary: Household-level settings (targets, salary deposit, employers)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Settings payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HouseholdSettings'
        "404":
          description: Household not found
    patch:
      tags: [household]
      summary: Update household settings (restricted fields)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HouseholdSettingsPatch'
      responses:
        "200":
          description: Updated settings payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HouseholdSettings'
        "400":
          description: Validation or business error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorsResponse'
                  - $ref: '#/components/schemas/ServiceErrorResponse'
        "404":
          description: Household not found
  /household/profile:
    get:
      tags: [household]
      summary: Signed-in person profile
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Profile payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile:
                    $ref: '#/components/schemas/HouseholdProfile'
        "404":
          description: Profile not found
    patch:
      tags: [household]
      summary: Update profile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HouseholdProfilePatch'
      responses:
        "200":
          description: Updated profile payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile:
                    $ref: '#/components/schemas/HouseholdProfile'
        "400":
          description: Validation failure (`{ errors: z.issues }`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "409":
          description: Email conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
  /household/members:
    get:
      tags: [household]
      summary: List household members
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/HouseholdProfile'
    post:
      tags: [household]
      summary: Create member (admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HouseholdMemberCreate'
      responses:
        "201":
          description: Member created
          content:
            application/json:
              schema:
                type: object
                properties:
                  member:
                    $ref: '#/components/schemas/HouseholdProfile'
                  inviteSent:
                    type: boolean
        "400":
          description: Validation failure or required-email business check
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorsResponse'
                  - $ref: '#/components/schemas/ServiceErrorResponse'
        "409":
          description: Email conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
  /household/members/{memberId}:
    patch:
      tags: [household]
      summary: Update member
      security: [{ bearerAuth: [] }]
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HouseholdMemberPatch'
      responses:
        "200":
          description: Member updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  member:
                    $ref: '#/components/schemas/HouseholdProfile'
        "400":
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "409":
          description: Email conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
    delete:
      tags: [household]
      summary: Remove member (admin). Deletes household_membership + person_profile. Returns 409 HAS_LOGIN_ACCOUNT when member has a linked login.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                deleteLogin:
                  type: boolean
      responses:
        "204":
          description: Member removed
        "400":
          description: Invalid member id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "409":
          description: Member has a linked login account (HAS_LOGIN_ACCOUNT)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
  /household/members/{memberId}/data-count:
    get:
      tags: [household]
      summary: Count assigned transactions and payslips for member
      security: [{ bearerAuth: [] }]
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Assignment counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HouseholdMemberDataCount'
        "400":
          description: Invalid member id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
  /household/members/{memberId}/create-login:
    post:
      tags: [household]
      summary: Create login account for existing member
      security: [{ bearerAuth: [] }]
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Login account created or invite sent
          content:
            application/json:
              schema:
                type: object
                required: [inviteSent]
                properties:
                  inviteSent:
                    type: boolean
        "400":
          description: Invalid member id or missing member email
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorsResponse'
                  - $ref: '#/components/schemas/ServiceErrorResponse'
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "409":
          description: Member already has login or email conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
  /household/members/{memberId}/reset-password:
    post:
      tags: [household]
      summary: Reset member login password (owner/admin). Sends reset email when SMTP is configured; otherwise returns a temporary password.
      description: >-
        When email is configured, sends a one-hour reset link and returns { emailSent: true }.
        When email is not configured, returns { emailSent: false, tempPassword } once (plaintext, not stored).
        404 if member not found; 409 NO_LOGIN if member has no login account.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Reset initiated (email or temporary password fallback)
          content:
            application/json:
              schema:
                type: object
                properties:
                  emailSent: { type: boolean }
                  tempPassword: { type: string }
        "400":
          description: Invalid member id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "409":
          description: Member has no login account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'

  /household/properties:
    get:
      summary: List all properties for the household
      tags: [household]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of properties
          content:
            application/json:
              schema:
                type: object
                properties:
                  properties:
                    type: array
                    items:
                      $ref: '#/components/schemas/PropertyRecord'
    post:
      summary: Create a property and optionally link to a mortgage account
      tags: [household]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                addressLine1: { type: string, nullable: true, maxLength: 200 }
                city: { type: string, nullable: true, maxLength: 100 }
                state: { type: string, nullable: true, maxLength: 100 }
                zip: { type: string, nullable: true, maxLength: 20 }
                propertyUse: { type: string, nullable: true, enum: [primary, rental, vacation] }
                accountId:
                  type: string
                  format: uuid
                  description: Financial account to link (mortgage)
                initialValueUsd: { type: number, nullable: true, minimum: 0 }
                initialValueAsOf: { type: string, format: date, nullable: true }
      responses:
        "201":
          description: Property created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
        "400":
          description: Validation error
        "404":
          description: Account not found (ACCOUNT_NOT_FOUND)

  /household/properties/{propertyId}:
    get:
      summary: Get a single property
      tags: [household]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: propertyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Property record
          content:
            application/json:
              schema:
                type: object
                properties:
                  property:
                    $ref: '#/components/schemas/PropertyRecord'
        "404":
          description: Not found
    patch:
      summary: Update property address or use
      tags: [household]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: propertyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                addressLine1: { type: string, nullable: true }
                city: { type: string, nullable: true }
                state: { type: string, nullable: true }
                zip: { type: string, nullable: true }
                propertyUse: { type: string, nullable: true, enum: [primary, rental, vacation] }
                purchasePrice: { type: integer, nullable: true, minimum: 1 }
                purchaseDate: { type: string, nullable: true, format: date }
                monthlyRent: { type: integer, nullable: true, minimum: 0 }
                propertyNotes: { type: string, nullable: true, maxLength: 2000 }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated: { type: boolean }
        "400":
          description: Validation error
        "404":
          description: Not found
    delete:
      summary: Delete a property and all its value snapshots
      description: Owner/admin only. Permanently removes the property and cascades deletion of value snapshots. Linked mortgage accounts have their property_id nulled automatically.
      tags: [household]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: propertyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  unlinkedAccounts:
                    type: integer
                    description: Number of financial accounts whose property_id was cleared
        "400":
          description: Invalid UUID
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — caller is not owner or admin
        "404":
          description: Property not found

  /household/properties/{propertyId}/equity-history:
    get:
      summary: AVM, mortgage balance, and equity per value snapshot date
      tags: [household]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: propertyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Equity history points
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      type: object
                      properties:
                        date: { type: string, example: "2025-10-01" }
                        avm: { type: number, example: 480000 }
                        mortgageBalance: { type: number, example: 320000 }
                        equity: { type: number, example: 160000 }
        "400":
          description: Invalid propertyId

  /household/properties/{propertyId}/values:
    get:
      summary: List all market value snapshots for a property (ASC date order)
      tags: [household]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: propertyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Value snapshot list
          content:
            application/json:
              schema:
                type: object
                properties:
                  snapshots:
                    type: array
                    items:
                      $ref: '#/components/schemas/PropertyValueSnapshot'
        "404":
          description: Not found
    post:
      summary: Add or upsert a market value snapshot (upserts on same date)
      tags: [household]
      x-cache-invalidates: [networth]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: propertyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [marketValueUsd, asOfDate]
              properties:
                marketValueUsd: { type: number, minimum: 0 }
                asOfDate: { type: string, format: date }
                source: { type: string, enum: [manual, api], default: manual }
      responses:
        "201":
          description: Snapshot created/updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
        "400":
          description: Validation error or INVALID_VALUE
        "404":
          description: Property not found

  /insights/financial:
    get:
      tags: [insights]
      summary: Latest financial health analysis for caller scope
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Latest insight or null
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    nullable: true
                    oneOf:
                      - $ref: '#/components/schemas/InsightRecord'
  /insights/financial/refresh:
    post:
      tags: [insights]
      summary: Trigger asynchronous financial health analysis generation
      security: [{ bearerAuth: [] }]
      responses:
        "202":
          description: Job enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  jobId: { type: string, format: uuid }
        "429":
          description: Refresh rate-limited (one request per household every 5 minutes)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: false }
                  code: { type: string, example: RATE_LIMITED }
                  message: { type: string }
                  retryAfterMs: { type: integer, minimum: 1 }
  /insights/financial/status/{jobId}:
    get:
      tags: [insights]
      summary: Poll insight generation job status
      security: [{ bearerAuth: [] }]
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    $ref: '#/components/schemas/InsightJob'
        "400":
          description: Invalid path params (`{ errors: z.issues }`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
  /insights/financial/history:
    get:
      tags: [insights]
      summary: List historical financial analyses for caller scope
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Insight history
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/InsightRecord'
  /insights/financial/{id}:
    get:
      tags: [insights]
      summary: Retrieve a specific historical financial analysis
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Historical insight
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    $ref: '#/components/schemas/InsightRecord'
        "400":
          description: Invalid path params (`{ errors: z.issues }`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
        "404":
          description: Insight not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
  /api/protest/{propertyId}/sold-comps:
    get:
      tags: [protest]
      summary: List Redfin comparable sold properties from property valuation data
      security: [{ bearerAuth: [] }]
      parameters:
        - name: propertyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Array of Redfin comp records (soldPrice/pricePerSqft may be null in TX)
          content:
            application/json:
              schema:
                type: object
                properties:
                  comps:
                    type: array
                    items:
                      type: object
                      properties:
                        address: { type: string, nullable: true }
                        city: { type: string, nullable: true }
                        state: { type: string, nullable: true }
                        sqft: { type: number, nullable: true }
                        beds: { type: number, nullable: true }
                        baths: { type: number, nullable: true }
                        yearBuilt: { type: number, nullable: true }
                        soldPrice: { type: number, nullable: true }
                        soldDate: { type: string, nullable: true }
                        pricePerSqft: { type: number, nullable: true }
                        listPrice: { type: number, nullable: true }
        "404": { description: Property not found }
  /api/protest/{propertyId}/comps:
    get:
      tags: [protest]
      summary: List saved DCAD comparable properties for a protest worksheet
      security: [{ bearerAuth: [] }]
      parameters:
        - name: propertyId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: year
          in: query
          required: false
          schema: { type: integer, minimum: 2000, maximum: 2100 }
      responses:
        "200":
          description: Array of DCAD comp records
          content:
            application/json:
              schema:
                type: object
                properties:
                  comps:
                    type: array
                    items:
                      type: object
                      properties:
                        dcadPropertyId: { type: string }
                        addressLine1: { type: string, nullable: true }
                        city: { type: string, nullable: true }
                        assessedValueUsd: { type: number, nullable: true }
                        marketValueUsd: { type: number, nullable: true }
                        sqft: { type: number, nullable: true }
                        beds: { type: number, nullable: true }
                        baths: { type: number, nullable: true }
                        yearBuilt: { type: integer, nullable: true }
                        perSqftUsd: { type: number, nullable: true }
        "404": { description: Property not found }
  /api/protest/{propertyId}/evidence-packet:
    get:
      tags: [protest]
      summary: Generate ARB evidence packet (PDF or DOCX)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: propertyId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: year
          in: query
          required: false
          schema: { type: integer, minimum: 2000, maximum: 2100 }
        - name: format
          in: query
          required: false
          schema: { type: string, enum: [pdf, docx], default: pdf }
          description: "pdf returns a PDF stream; docx returns a Word document buffer"
      responses:
        "200":
          description: Evidence packet file
          content:
            application/pdf:
              schema: { type: string, format: binary }
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema: { type: string, format: binary }
        "400": { description: Validation error }
        "401": { description: Unauthorized }
        "404": { description: Property not found }
  /api/protest/{propertyId}/worksheet:
    get:
      tags: [protest]
      summary: Get or create protest worksheet for property/year
      security: [{ bearerAuth: [] }]
      parameters:
        - name: propertyId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: year
          in: query
          required: false
          schema: { type: integer, minimum: 2000, maximum: 2100 }
      responses:
        "200":
          description: Worksheet record
          content:
            application/json:
              schema:
                type: object
                properties:
                  worksheet:
                    $ref: '#/components/schemas/ProtestWorksheet'
        "400":
          description: Validation error
        "404":
          description: Property not found
    patch:
      tags: [protest]
      summary: Update protest worksheet status and hearing date
      security: [{ bearerAuth: [] }]
      parameters:
        - name: propertyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [year]
              properties:
                year: { type: integer, minimum: 2000, maximum: 2100 }
                status: { type: string, enum: [not_filed, filed, informal, arb, resolved] }
                outcome: { type: string, enum: [settled_informal, won_arb, lost_arb, withdrawn], nullable: true }
                informalOfferUsd: { type: integer, minimum: 0, nullable: true }
                hearingDate: { type: string, format: date, nullable: true }
                filingDeadline: { type: string, format: date, nullable: true }
                cadPortalUrl: { type: string, format: uri, nullable: true }
      responses:
        "200":
          description: Worksheet updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  worksheet:
                    $ref: '#/components/schemas/ProtestWorksheet'
        "400":
          description: Validation error
        "404":
          description: Property not found
  /api/protest/{propertyId}/chat:
    post:
      tags: [protest]
      summary: Chat with protest assistant for a property
      security: [{ bearerAuth: [] }]
      parameters:
        - name: propertyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message: { type: string }
                attachmentText: { type: string }
                attachmentType: { type: string, enum: [pdf, url, text] }
                year: { type: integer, minimum: 2000, maximum: 2100 }
      responses:
        "200":
          description: Assistant response + side effects summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  assistantMessage: { type: string }
                  strategyUpdated: { type: boolean }
                  compsAdded: { type: integer }
                  soldCompsRefreshed: { type: boolean }
                  valuationAgeHours:
                    type: integer
                    nullable: true
                    description: Hours since valuation_fetched_at; null if never valued via Redfin
        "400":
          description: Validation error
        "404":
          description: Property not found
  /gdrive/oauth/callback:
    get:
      tags: [gdrive]
      summary: Google OAuth2 redirect callback (browser)
      description: |
        Public endpoint (no JWT). Google redirects here with `code` and `state` after user consent.
        Exchanges the code for tokens, verifies folder access, persists `household_gdrive_config`, then redirects the
        browser to the hash-router SPA (`…/#/settings?tab=data&gdrive=connected` or `gdrive=error&message=...`).
        Redirect origin: `FRONTEND_APP_URL`, else `PUBLIC_BASE_URL`, else in `MODE=TEST` defaults to `http://localhost:3000`,
        else relative to the API host (same-origin deployments).
      parameters:
        - name: code
          in: query
          required: true
          schema: { type: string }
        - name: state
          in: query
          required: true
          schema: { type: string }
      responses:
        "302":
          description: Redirect to SPA settings with query outcome
        "400":
          description: Missing code or state (implementation may still redirect with error query)
  /gdrive/oauth/url:
    get:
      tags: [gdrive]
      summary: Build Google OAuth consent URL for Drive folder connect
      description: |
        Owner only. Returns `{ "url": "..." }` for `window.location` redirect. Requires server env
        `GOOGLE_CLIENT_ID`, `GOOGLE_CLIENT_SECRET`, and `GOOGLE_REDIRECT_URI`.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: folderId
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Consent URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDriveOAuthUrlResponse'
        "400":
          description: Missing folderId, Zod validation failure, or OAuth env not configured
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/GDriveOAuthNotConfiguredResponse'
                  - type: object
                    required: [message]
                    properties:
                      message: { type: string }
                      issues:
                        type: array
                        items: { type: object }
        "401":
          description: Unauthorized
        "403":
          description: Non-owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
  /gdrive/status:
    get:
      tags: [gdrive]
      summary: Google Drive connection status (no secrets returned)
      description: Owner or admin. Returns whether Drive OAuth is configured for the household; never includes tokens.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Disconnected or connected summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDriveStatusResponse'
        "401":
          description: Unauthorized
        "403":
          description: Member role (insufficient permissions)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
  /gdrive/connect:
    post:
      tags: [gdrive]
      summary: Complete Google Drive connect via OAuth2 authorization code
      description: |
        Owner only. Exchanges the Google `code` for refresh/access tokens, verifies the Drive folder, then upserts
        `household_gdrive_config` (scheduler fields are preserved on reconnect). Rate-limited outside TEST mode.
        The primary browser flow uses `GET /gdrive/oauth/callback` instead; this endpoint supports programmatic exchange.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GDriveConnectRequest'
      responses:
        "200":
          description: Connected; folder verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDriveConnectSuccessResponse'
        "400":
          description: Zod validation failure or OAuth env not configured on server
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/GDriveOAuthNotConfiguredResponse'
                  - type: object
                    required: [message]
                    properties:
                      message: { type: string }
                      issues:
                        type: array
                        items: { type: object }
        "401":
          description: Unauthorized
        "403":
          description: Non-owner (insufficient permissions)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "422":
          description: Drive API connection test failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDriveConnectionFailedResponse'
        "429":
          description: Too many connect attempts in the rolling window
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message: { type: string }
  /gdrive/disconnect:
    delete:
      tags: [gdrive]
      summary: Disconnect Google Drive (remove stored credentials)
      description: Owner only.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                type: object
                required: [connected]
                properties:
                  connected:
                    type: boolean
                    enum: [false]
        "401":
          description: Unauthorized
        "403":
          description: Non-owner (insufficient permissions)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
  /gdrive/backup:
    post:
      tags: [gdrive]
      summary: Queue on-demand Google Drive backup (.hfb upload)
      description: |
        Owner only. Requires Google Drive to be connected (`household_gdrive_config`). Queues an async job that
        builds a household `.hfb` on disk, uploads it to the configured folder using the stored OAuth refresh token,
        then deletes the staging file. Rate-limited outside TEST mode.
      security: [{ bearerAuth: [] }]
      responses:
        "202":
          description: Backup job started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupJobStartResponse'
        "401":
          description: Unauthorized
        "403":
          description: Non-owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "409":
          description: Google Drive not configured for this household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDriveNotConfiguredResponse'
        "429":
          description: Too many backup starts in the rolling window
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message: { type: string }
  /gdrive/backup/{jobId}:
    get:
      tags: [gdrive]
      summary: Google Drive backup job status
      description: Owner or admin. Returns status and Drive file metadata when complete.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupJobStatusResponse'
        "401":
          description: Unauthorized
        "403":
          description: Member role (insufficient permissions)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "404":
          description: Job not found for this household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupJobNotFoundResponse'
  /gdrive/settings:
    patch:
      tags: [gdrive]
      summary: Update Google Drive automatic backup scheduler settings
      description: |
        Owner only. Updates `backup_frequency_hours` (0 = disabled; otherwise 12, 24, 48, 72, or 168) and
        `backup_retention_count` (1–30 `.hfb` files kept in Drive after each successful upload; older files pruned).
        Requires an existing `household_gdrive_config` row.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GDriveSchedulerSettingsRequest'
      responses:
        "200":
          description: Updated settings (echo)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDriveSchedulerSettingsResponse'
        "400":
          description: Zod validation failure
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message: { type: string }
                  issues:
                    type: array
                    items: { type: object }
        "401":
          description: Unauthorized
        "403":
          description: Non-owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "409":
          description: Google Drive not configured for this household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDriveNotConfiguredResponse'
  /gdrive/backups/history:
    get:
      tags: [gdrive]
      summary: List recent backup jobs (local `backup_job` rows)
      description: |
        Owner or admin. Returns up to 20 recent rows from `backup_job` for this household (upload attempts, including
        automatic scheduler jobs with `triggeredByUserId` null). This is not the Drive file list; use `GET /gdrive/backups`
        for the restore picker.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Job history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDriveBackupHistoryResponse'
        "401":
          description: Unauthorized
        "403":
          description: Member role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "409":
          description: Google Drive not connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDriveNotConfiguredResponse'
  /gdrive/backups:
    get:
      tags: [gdrive]
      summary: List recent .hfb backups in the connected Drive folder
      description: |
        Owner or admin. Calls the Drive API `files.list` for the configured folder (names containing `.hfb`, not trashed),
        newest first, page size 20. Returns an empty array when there are no matching files.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: File list (may be empty)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriveBackupsListResponse'
        "401":
          description: Unauthorized
        "403":
          description: Member role (insufficient permissions)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "409":
          description: Google Drive not connected for this household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDriveNotConfiguredResponse'
        "502":
          description: Drive API failure (list request)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriveListFailedResponse'
  /gdrive/backups/{fileId}/preview:
    post:
      tags: [gdrive]
      summary: Preview a Drive backup file manifest
      description: |
        Owner only. Downloads the Drive file identified by `fileId` into a temporary staging path, reads the `.hfb`
        manifest via the shared `readHfbManifestFromFile()` helper, and returns a preview object. The temp file is
        always deleted. Returns the same shape as `POST /exports/preview`.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
          description: Google Drive file ID
      responses:
        "200":
          description: Backup manifest preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupPreviewResponse'
        "400":
          description: File is not a valid .hfb
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "403":
          description: Drive permission denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "404":
          description: Drive file not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "409":
          description: Google Drive not connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDriveNotConfiguredResponse'
        "422":
          description: Backup is encrypted and no BACKUP_ENCRYPTION_KEY is configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "502":
          description: Drive download failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
  /gdrive/restore:
    post:
      tags: [gdrive]
      summary: Restore household from a Drive backup file
      description: |
        Owner only. Downloads the given Drive file into staging, then queues the same async restore pipeline as
        `POST /exports/household/import`. Poll `GET /exports/import/{jobId}` until terminal status; JWTs may be
        invalidated after success (same as local restore).
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GDriveRestoreRequest'
      responses:
        "202":
          description: Restore job started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriveRestoreStartedResponse'
        "400":
          description: Invalid JSON body (Zod validation failure)
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message: { type: string }
                  issues:
                    type: array
                    items: { type: object }
        "401":
          description: Unauthorized
        "403":
          description: Non-owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "409":
          description: Google Drive not connected for this household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDriveNotConfiguredResponse'
        "502":
          description: Failed to download the file from Drive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriveDownloadFailedResponse'
  /notifications:
    get:
      tags: [notifications]
      summary: List notifications for the authenticated user
      description: Returns up to 40 unread notifications (newest first) plus up to 10 recent read notifications.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        householdId: { type: string, format: uuid }
                        userId: { type: string, format: uuid, nullable: true }
                        type: { type: string }
                        title: { type: string }
                        body: { type: string }
                        actionUrl: { type: string, nullable: true }
                        readAt: { type: string, format: date-time, nullable: true }
                        createdAt: { type: string, format: date-time }
        "401":
          description: Unauthorized

  /notifications/unread-count:
    get:
      tags: [notifications]
      summary: Get unread notification count
      description: Lightweight endpoint polled every 60 seconds by the frontend bell icon.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }
        "401":
          description: Unauthorized

  /notifications/read-all:
    post:
      tags: [notifications]
      summary: Mark all notifications as read
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: All notifications marked read
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "401":
          description: Unauthorized

  /notifications/preferences:
    get:
      tags: [notifications]
      summary: Get notification preferences for the authenticated user
      description: Returns one entry per notification type. Missing rows fall back to system defaults.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Preference matrix
          content:
            application/json:
              schema:
                type: object
                properties:
                  preferences:
                    type: array
                    items:
                      type: object
                      properties:
                        userId: { type: string, format: uuid }
                        notificationType: { type: string }
                        enabledEmail: { type: boolean }
                        enabledInapp: { type: boolean }
        "401":
          description: Unauthorized
    put:
      tags: [notifications]
      summary: Bulk upsert notification preferences
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [preferences]
              properties:
                preferences:
                  type: array
                  items:
                    type: object
                    required: [notificationType, enabledEmail, enabledInapp]
                    properties:
                      notificationType: { type: string }
                      enabledEmail: { type: boolean }
                      enabledInapp: { type: boolean }
      responses:
        "200":
          description: Updated full preference matrix
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized

  /notifications/{id}/read:
    patch:
      tags: [notifications]
      summary: Mark a single notification as read
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Notification marked read
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "401":
          description: Unauthorized
        "404":
          description: Notification not found or belongs to a different user

  /categories:
    get:
      tags: [categories]
      summary: List categories for household
      security: [{ bearerAuth: [] }]
    post:
      tags: [categories]
      summary: Create household-owned category (owner or admin)
      description: Role owner or admin required; members receive 403.
      security: [{ bearerAuth: [] }]
  /categories/{categoryId}:
    patch:
      tags: [categories]
      summary: Update category — owner or admin only
      description: Built-in defaults (household_id null) require owner or admin; household categories also require owner or admin.
      security: [{ bearerAuth: [] }]
    delete:
      tags: [categories]
      summary: Delete household-owned category — owner or admin only (built-in returns 403 BUILTIN_READONLY)
      security: [{ bearerAuth: [] }]
  /categories/rules:
    get:
      tags: [categories]
      summary: List category rules
      security: [{ bearerAuth: [] }]
    post:
      tags: [categories]
      summary: Create category rule (owner or admin)
      description: >-
        Role owner or admin required; members receive 403.
        Body may include amountScope (any, credit_only, debit_only); defaults to any.
        Matches multi-pattern field `patterns` for batch of rules sharing the same scope.
      security: [{ bearerAuth: [] }]
  /categories/rules/household:
    delete:
      tags: [categories]
      summary: Delete all household category rules (owner or admin)
      description: >-
        Role owner or admin required; members receive 403.
        Removes every row in category_rule for this household. Does not affect built-in global rules.
      security: [{ bearerAuth: [] }]
  /categories/rules/bulk:
    post:
      tags: [categories]
      summary: Bulk create household category rules (owner or admin)
      description: >-
        Role owner or admin required; members receive 403.
        Best-effort batch create. Each rule needs pattern, matchType, and categoryId or categoryPath.
        Optional amountScope per row (defaults to any). Response 200 with created rules and per-row errors.
      security: [{ bearerAuth: [] }]
  /categories/rules/builtin/bulk:
    post:
      tags: [categories]
      summary: Bulk create global built-in category rules (owner or admin)
      description: >-
        Same as household bulk but amountScope per row; category must be a default global leaf.
        Response 200 with created rules and per-row errors.
      security: [{ bearerAuth: [] }]
  /categories/rules/builtin:
    post:
      tags: [categories]
      summary: Create single global built-in category rule (owner or admin)
      security: [{ bearerAuth: [] }]
  /categories/rules/builtin/{ruleId}:
    patch:
      tags: [categories]
      summary: Update built-in global rule (owner or admin)
      security: [{ bearerAuth: [] }]
    delete:
      tags: [categories]
      summary: Delete built-in global rule (owner or admin)
      security: [{ bearerAuth: [] }]
  /categories/rules/test:
    post:
      tags: [categories]
      summary: Test a rule pattern against sample descriptions (dry-run; no DB changes)
      security: [{ bearerAuth: [] }]
  /categories/rules/recategorize:
    post:
      tags: [categories]
      summary: Re-run classification rules against existing canonical transactions (owner or admin)
      description: Reclassifies posted transactions that have Unknown or no category using the current rule set. Role owner or admin required.
      security: [{ bearerAuth: [] }]
  /categories/rules/from-ledger:
    post:
      tags: [categories]
      summary: Create a rule from a ledger transaction — owner or admin only
