openapi: 3.1.0
info:
  title: Household Finance API
  version: 0.1.0
  description: |
    HTTP API for the self-hosted household finance app. All authenticated routes expect
    `Authorization: Bearer <JWT>` unless noted. See `docs/API_INDEX.md` for prose topic guides.
servers:
  - url: /
    description: Relative to configured API base URL
tags:
  - name: health
  - name: auth
  - name: household
  - name: categories
  - name: imports
  - name: transactions
  - name: resolution
  - name: reports
  - name: payslips
  - name: exports
  - name: budget
  - name: recurring
  - name: insights
  - name: gdrive
paths:
  /health:
    get:
      tags: [health]
      summary: Liveness / readiness
      responses:
        "200":
          description: OK
  /auth/login:
    post:
      tags: [auth]
      summary: Obtain JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                type: object
                required: [token, forcePasswordChange]
                properties:
                  token:
                    type: string
                  forcePasswordChange:
                    type: boolean
                    description: When true, client should send the user through forced password reset before normal app use.
        "401":
          description: Invalid credentials
  /auth/me:
    get:
      tags: [auth]
      summary: Current user and role
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: User payload
        "401":
          description: Unauthorized
  /auth/setup-forced-change-token:
    post:
      tags: [auth]
      summary: Issue reset token for forced password change (signed-in users only)
      description: |
        When `force_password_change` is true for the authenticated user, creates a short-lived
        password reset token (same mechanism as forgot-password) and returns the raw token so the
        client can redirect to the reset-password UI. Returns 403 if no forced change is pending.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Raw one-time reset token (use with POST /auth/reset-password)
          content:
            application/json:
              schema:
                type: object
                required: [token]
                properties:
                  token:
                    type: string
                    minLength: 1
        "401":
          description: Unauthorized
        "403":
          description: User does not have a forced password change pending
          content:
            application/json:
              schema:
                type: object
                required: [code, message]
                properties:
                  code:
                    type: string
                    enum: [NOT_FORCED]
                  message:
                    type: string
                    example: No forced password change pending.
  /auth/capabilities:
    get:
      tags: [auth]
      summary: Public auth feature capabilities
      responses:
        "200":
          description: Capability flags
          content:
            application/json:
              schema:
                type: object
                required: [emailEnabled]
                properties:
                  emailEnabled: { type: boolean }
  /auth/forgot-password:
    post:
      tags: [auth]
      summary: Request a password reset link (always responds 200)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          description: Generic success response (same for known/unknown email)
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    example: If that address is registered, a reset link is on its way.
        "400":
          description: Validation failure (`{ errors: z.issues }`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
  /auth/reset-password:
    post:
      tags: [auth]
      summary: Reset password using one-time token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                  minLength: 1
                newPassword:
                  type: string
                  minLength: 12
                  pattern: ^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z\d]).{12,}$
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message: { type: string, example: Password updated. Please sign in. }
        "400":
          description: Invalid/expired token, same password, or validation error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthResetInvalidTokenResponse'
                  - $ref: '#/components/schemas/AuthResetSameAsCurrentResponse'
                  - $ref: '#/components/schemas/ValidationErrorsResponse'
  /auth/change-password:
    post:
      tags: [auth]
      summary: Change password for signed-in user. Requires uppercase+lowercase+digit+special char, min 10 chars.
      security: [{ bearerAuth: [] }]
  /auth/logout:
    post:
      tags: [auth]
      summary: Invalidate all existing JWTs for the current user (increments token_version). Returns 204.
      security: [{ bearerAuth: [] }]
  /household/settings:
    get:
      tags: [household]
      summary: Household-level settings (targets, salary deposit, employers)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Settings payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HouseholdSettings'
        "404":
          description: Household not found
    patch:
      tags: [household]
      summary: Update household settings (restricted fields)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HouseholdSettingsPatch'
      responses:
        "200":
          description: Updated settings payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HouseholdSettings'
        "400":
          description: Validation or business error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorsResponse'
                  - $ref: '#/components/schemas/ServiceErrorResponse'
        "404":
          description: Household not found
  /household/profile:
    get:
      tags: [household]
      summary: Signed-in person profile
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Profile payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile:
                    $ref: '#/components/schemas/HouseholdProfile'
        "404":
          description: Profile not found
    patch:
      tags: [household]
      summary: Update profile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HouseholdProfilePatch'
      responses:
        "200":
          description: Updated profile payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile:
                    $ref: '#/components/schemas/HouseholdProfile'
        "400":
          description: Validation failure (`{ errors: z.issues }`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "409":
          description: Email conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
  /household/members:
    get:
      tags: [household]
      summary: List household members
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/HouseholdProfile'
    post:
      tags: [household]
      summary: Create member (admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HouseholdMemberCreate'
      responses:
        "201":
          description: Member created
          content:
            application/json:
              schema:
                type: object
                properties:
                  member:
                    $ref: '#/components/schemas/HouseholdProfile'
                  inviteSent:
                    type: boolean
        "400":
          description: Validation failure or required-email business check
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorsResponse'
                  - $ref: '#/components/schemas/ServiceErrorResponse'
        "409":
          description: Email conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
  /household/members/{memberId}:
    patch:
      tags: [household]
      summary: Update member
      security: [{ bearerAuth: [] }]
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HouseholdMemberPatch'
      responses:
        "200":
          description: Member updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  member:
                    $ref: '#/components/schemas/HouseholdProfile'
        "400":
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "409":
          description: Email conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
    delete:
      tags: [household]
      summary: Remove member (admin). Deletes household_membership + person_profile. Returns 409 HAS_LOGIN_ACCOUNT when member has a linked login.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                deleteLogin:
                  type: boolean
      responses:
        "204":
          description: Member removed
        "400":
          description: Invalid member id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "409":
          description: Member has a linked login account (HAS_LOGIN_ACCOUNT)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
  /household/members/{memberId}/data-count:
    get:
      tags: [household]
      summary: Count assigned transactions and payslips for member
      security: [{ bearerAuth: [] }]
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Assignment counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HouseholdMemberDataCount'
        "400":
          description: Invalid member id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
  /household/members/{memberId}/create-login:
    post:
      tags: [household]
      summary: Create login account for existing member
      security: [{ bearerAuth: [] }]
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Login account created or invite sent
          content:
            application/json:
              schema:
                type: object
                required: [inviteSent]
                properties:
                  inviteSent:
                    type: boolean
        "400":
          description: Invalid member id or missing member email
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorsResponse'
                  - $ref: '#/components/schemas/ServiceErrorResponse'
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "409":
          description: Member already has login or email conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
  /household/members/{memberId}/reset-password:
    post:
      tags: [household]
      summary: Reset member login password (owner/admin). Sends reset email when SMTP is configured; otherwise returns a temporary password.
      description: >-
        When email is configured, sends a one-hour reset link and returns { emailSent: true }.
        When email is not configured, returns { emailSent: false, tempPassword } once (plaintext, not stored).
        404 if member not found; 409 NO_LOGIN if member has no login account.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Reset initiated (email or temporary password fallback)
          content:
            application/json:
              schema:
                type: object
                properties:
                  emailSent: { type: boolean }
                  tempPassword: { type: string }
        "400":
          description: Invalid member id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "409":
          description: Member has no login account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'

  /insights/financial:
    get:
      tags: [insights]
      summary: Latest financial health analysis for caller scope
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Latest insight or null
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    nullable: true
                    oneOf:
                      - $ref: '#/components/schemas/InsightRecord'
  /insights/financial/refresh:
    post:
      tags: [insights]
      summary: Trigger asynchronous financial health analysis generation
      security: [{ bearerAuth: [] }]
      responses:
        "202":
          description: Job enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  jobId: { type: string, format: uuid }
        "429":
          description: Refresh rate-limited (one request per household every 5 minutes)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: false }
                  code: { type: string, example: RATE_LIMITED }
                  message: { type: string }
                  retryAfterMs: { type: integer, minimum: 1 }
  /insights/financial/status/{jobId}:
    get:
      tags: [insights]
      summary: Poll insight generation job status
      security: [{ bearerAuth: [] }]
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    $ref: '#/components/schemas/InsightJob'
        "400":
          description: Invalid path params (`{ errors: z.issues }`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
  /insights/financial/history:
    get:
      tags: [insights]
      summary: List historical financial analyses for caller scope
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Insight history
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/InsightRecord'
  /insights/financial/{id}:
    get:
      tags: [insights]
      summary: Retrieve a specific historical financial analysis
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Historical insight
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    $ref: '#/components/schemas/InsightRecord'
        "400":
          description: Invalid path params (`{ errors: z.issues }`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorsResponse'
        "404":
          description: Insight not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
  /gdrive/status:
    get:
      tags: [gdrive]
      summary: Google Drive connection status (no secrets returned)
      description: Owner or admin. Returns whether a service account folder is configured; never includes the key JSON.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Disconnected or connected summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDriveStatusResponse'
        "401":
          description: Unauthorized
        "403":
          description: Member role (insufficient permissions)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
  /gdrive/connect:
    post:
      tags: [gdrive]
      summary: Connect Google Drive folder via service account key
      description: |
        Owner only. Parses and validates the service account JSON, verifies access to the Drive folder via the Drive API,
        then stores credentials for the household. Rate-limited outside TEST mode.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GDriveConnectRequest'
      responses:
        "200":
          description: Connected; folder verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDriveConnectSuccessResponse'
        "400":
          description: Invalid JSON body, invalid key JSON, invalid key shape, or Zod validation failure
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/GDriveInvalidKeyJsonResponse'
                  - $ref: '#/components/schemas/GDriveInvalidKeyFormatResponse'
                  - type: object
                    required: [message]
                    properties:
                      message: { type: string }
                      issues:
                        type: array
                        items: { type: object }
        "401":
          description: Unauthorized
        "403":
          description: Non-owner (insufficient permissions)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "422":
          description: Drive API connection test failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDriveConnectionFailedResponse'
        "429":
          description: Too many connect attempts in the rolling window
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message: { type: string }
  /gdrive/disconnect:
    delete:
      tags: [gdrive]
      summary: Disconnect Google Drive (remove stored credentials)
      description: Owner only.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                type: object
                required: [connected]
                properties:
                  connected:
                    type: boolean
                    enum: [false]
        "401":
          description: Unauthorized
        "403":
          description: Non-owner (insufficient permissions)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
  /gdrive/backup:
    post:
      tags: [gdrive]
      summary: Queue on-demand Google Drive backup (.hfb upload)
      description: |
        Owner only. Requires Google Drive to be connected (`household_gdrive_config`). Queues an async job that
        builds a household `.hfb` on disk, uploads it to the configured folder via the service account, then deletes
        the staging file. Rate-limited outside TEST mode.
      security: [{ bearerAuth: [] }]
      responses:
        "202":
          description: Backup job started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupJobStartResponse'
        "401":
          description: Unauthorized
        "403":
          description: Non-owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "409":
          description: Google Drive not configured for this household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDriveNotConfiguredResponse'
        "429":
          description: Too many backup starts in the rolling window
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message: { type: string }
  /gdrive/backup/{jobId}:
    get:
      tags: [gdrive]
      summary: Google Drive backup job status
      description: Owner or admin. Returns status and Drive file metadata when complete.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupJobStatusResponse'
        "401":
          description: Unauthorized
        "403":
          description: Member role (insufficient permissions)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "404":
          description: Job not found for this household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupJobNotFoundResponse'
  /gdrive/backups:
    get:
      tags: [gdrive]
      summary: List recent .hfb backups in the connected Drive folder
      description: |
        Owner or admin. Calls the Drive API `files.list` for the configured folder (names containing `.hfb`, not trashed),
        newest first, page size 20. Returns an empty array when there are no matching files.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: File list (may be empty)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriveBackupsListResponse'
        "401":
          description: Unauthorized
        "403":
          description: Member role (insufficient permissions)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "502":
          description: Drive API failure or Google Drive not configured for this household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriveListFailedResponse'
  /gdrive/restore:
    post:
      tags: [gdrive]
      summary: Restore household from a Drive backup file
      description: |
        Owner only. Downloads the given Drive file into staging, then queues the same async restore pipeline as
        `POST /exports/household/import`. Poll `GET /exports/import/{jobId}` until terminal status; JWTs may be
        invalidated after success (same as local restore).
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GDriveRestoreRequest'
      responses:
        "202":
          description: Restore job started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriveRestoreStartedResponse'
        "400":
          description: Invalid JSON body (Zod validation failure)
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message: { type: string }
                  issues:
                    type: array
                    items: { type: object }
        "401":
          description: Unauthorized
        "403":
          description: Non-owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        "409":
          description: Google Drive not connected for this household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDriveNotConfiguredResponse'
        "502":
          description: Failed to download the file from Drive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriveDownloadFailedResponse'
  /categories:
    get:
      tags: [categories]
      summary: List categories for household
      security: [{ bearerAuth: [] }]
    post:
      tags: [categories]
      summary: Create household-owned category (owner or admin)
      description: Role owner or admin required; members receive 403.
      security: [{ bearerAuth: [] }]
  /categories/{categoryId}:
    patch:
      tags: [categories]
      summary: Update category — owner or admin only
      description: Built-in defaults (household_id null) require owner or admin; household categories also require owner or admin.
      security: [{ bearerAuth: [] }]
    delete:
      tags: [categories]
      summary: Delete household-owned category — owner or admin only (built-in returns 403 BUILTIN_READONLY)
      security: [{ bearerAuth: [] }]
  /categories/rules:
    get:
      tags: [categories]
      summary: List category rules
      security: [{ bearerAuth: [] }]
    post:
      tags: [categories]
      summary: Create category rule (owner or admin)
      description: >-
        Role owner or admin required; members receive 403.
        Body may include amountScope (any, credit_only, debit_only); defaults to any.
        Matches multi-pattern field `patterns` for batch of rules sharing the same scope.
      security: [{ bearerAuth: [] }]
  /categories/rules/household:
    delete:
      tags: [categories]
      summary: Delete all household category rules (owner or admin)
      description: >-
        Role owner or admin required; members receive 403.
        Removes every row in category_rule for this household. Does not affect built-in global rules.
      security: [{ bearerAuth: [] }]
  /categories/rules/bulk:
    post:
      tags: [categories]
      summary: Bulk create household category rules (owner or admin)
      description: >-
        Role owner or admin required; members receive 403.
        Best-effort batch create. Each rule needs pattern, matchType, and categoryId or categoryPath.
        Optional amountScope per row (defaults to any). Response 200 with created rules and per-row errors.
      security: [{ bearerAuth: [] }]
  /categories/rules/builtin/bulk:
    post:
      tags: [categories]
      summary: Bulk create global built-in category rules (owner or admin)
      description: >-
        Same as household bulk but amountScope per row; category must be a default global leaf.
        Response 200 with created rules and per-row errors.
      security: [{ bearerAuth: [] }]
  /categories/rules/builtin:
    post:
      tags: [categories]
      summary: Create single global built-in category rule (owner or admin)
      security: [{ bearerAuth: [] }]
  /categories/rules/builtin/{ruleId}:
    patch:
      tags: [categories]
      summary: Update built-in global rule (owner or admin)
      security: [{ bearerAuth: [] }]
    delete:
      tags: [categories]
      summary: Delete built-in global rule (owner or admin)
      security: [{ bearerAuth: [] }]
  /categories/rules/test:
    post:
      tags: [categories]
      summary: Test a rule pattern against sample descriptions (dry-run; no DB changes)
      security: [{ bearerAuth: [] }]
  /categories/rules/recategorize:
    post:
      tags: [categories]
      summary: Re-run classification rules against existing canonical transactions (owner or admin)
      description: Reclassifies posted transactions that have Unknown or no category using the current rule set. Role owner or admin required.
      security: [{ bearerAuth: [] }]
  /categories/rules/from-ledger:
    post:
      tags: [categories]
      summary: Create a rule from a ledger transaction — owner or admin only
      security: [{ bearerAuth: [] }]
  /categories/rules/rule-learning-preview:
    post:
      tags: [categories]
      summary: Preview what rule auto-learning would create from recent category edits
      security: [{ bearerAuth: [] }]
  /categories/rules/{ruleId}:
    patch:
      tags: [categories]
      summary: Update rule (owner or admin)
      security: [{ bearerAuth: [] }]
    delete:
      tags: [categories]
      summary: Delete household category rule (owner or admin)
      description: Permanently removes a household rule (built-in rules use /categories/rules/builtin/{id}). Role owner or admin required.
      security: [{ bearerAuth: [] }]
  /imports/accounts:
    get:
      tags: [imports]
      summary: List financial accounts
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Household financial accounts with import freshness metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  accounts:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        type: { type: string }
                        institution: { type: string }
                        account_mask: { type: string, nullable: true }
                        currency: { type: string }
                        owner_scope: { type: string, enum: [household, person] }
                        owner_person_profile_id: { type: string, format: uuid, nullable: true }
                        default_parser_profile_id: { type: string, nullable: true }
                        last_uploaded_at:
                          type: string
                          format: date-time
                          nullable: true
                          description: Latest successfully parsed statement upload for this account.
                        last_statement_end_date:
                          type: string
                          nullable: true
                          description: Latest detected statement period end date (YYYY-MM-DD) from parsed statement metadata.
    post:
      tags: [imports]
      summary: Create connected account
      security: [{ bearerAuth: [] }]
  /imports/accounts/{accountId}:
    patch:
      tags: [imports]
      summary: Update connected account
      security: [{ bearerAuth: [] }]
  /imports/parser-profiles:
    get:
      tags: [imports]
      summary: List known parser profile ids
      security: [{ bearerAuth: [] }]
  /imports/institutions:
    get:
      tags: [imports]
      summary: Curated institution labels and household custom institutions
      security: [{ bearerAuth: [] }]
  /imports/institutions/custom:
    post:
      tags: [imports]
      summary: Add household custom institution name
      security: [{ bearerAuth: [] }]
  /imports/upload:
    post:
      tags: [imports]
      summary: One-shot import upload (bank or payslip)
      description: Upload a single file and run the end-to-end import flow for bank transactions or payslips.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [importType, file]
              properties:
                importType:
                  type: string
                  enum: [bank, payslip]
                financialAccountId:
                  type: string
                  format: uuid
                  description: Required when importType is bank
                employerId:
                  type: string
                  format: uuid
                  description: Optional when importType is payslip
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Bank import uploaded and canonicalized
        "201":
          description: Payslip upload parsed and inserted
        "409":
          description: Duplicate payslip upload
        "422":
          description: Business validation failure (parser inference, parse, employer, etc.)
  /imports/history:
    get:
      tags: [imports]
      summary: Unified recent import history (bank sessions + payslip uploads)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Recent merged import items (newest first, max 50)
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        type: { type: string, enum: [bank, payslip] }
                        accountType: { type: string, nullable: true, description: Bank account type context when available (e.g. checking, credit_card) }
                        createdAt: { type: string, format: date-time }
                        label: { type: string }
                        status: { type: string }
                        addedCount: { type: number, nullable: true }
                        duplicateCount: { type: number, nullable: true }
                        canUndo: { type: boolean }
  /imports/sessions:
    get:
      tags: [imports]
      summary: List import sessions (newest first)
      security: [{ bearerAuth: [] }]
    post:
      tags: [imports]
      summary: Create import session
      description: Members with a linked person profile may create sessions; members without a profile receive 403. Owners and admins always allowed.
      security: [{ bearerAuth: [] }]
  /imports/sessions/{sessionId}:
    get:
      tags: [imports]
      summary: Session detail — members restricted to own sessions (404 if not theirs)
      security: [{ bearerAuth: [] }]
  /imports/sessions/{sessionId}/status:
    patch:
      tags: [imports]
      summary: Transition session status — members restricted to own sessions
      description: Members can only update sessions they created; 403 otherwise.
      security: [{ bearerAuth: [] }]
  /imports/sessions/{sessionId}/summary:
    get:
      tags: [imports]
      summary: Per-file import summary — members restricted to own sessions
      security: [{ bearerAuth: [] }]
  /imports/sessions/{sessionId}/files:
    post:
      tags: [imports]
      summary: Upload files to session — members restricted to own sessions (multipart field `files`)
      security: [{ bearerAuth: [] }]
  /imports/sessions/{sessionId}/files/{fileId}:
    patch:
      tags: [imports]
      summary: Bind file to account and parser — members restricted to own sessions and own accounts
      description: Members must own the session and bind only to accounts where owner_person_profile_id matches their profile.
      security: [{ bearerAuth: [] }]
    delete:
      tags: [imports]
      summary: Remove a staged file from the session — members restricted to own sessions
      security: [{ bearerAuth: [] }]
  /imports/sessions/{sessionId}/files/{fileId}/ofx-suggestion:
    get:
      tags: [imports]
      summary: Pre-flight OFX account suggestion from statement header (institution, account type, acctId)
      security: [{ bearerAuth: [] }]
  /imports/sessions/{sessionId}/ofx-confirm:
    post:
      tags: [imports]
      summary: Confirm OFX account suggestion — members restricted to own sessions and own accounts
      description: Members must own the session and the target financial account.
      security: [{ bearerAuth: [] }]
  /imports/sessions/{sessionId}/reconcile-payslip-async:
    post:
      tags: [imports]
      summary: Poll and reconcile pending async LLM payslip extractions — members restricted to own sessions
      description: >-
        Checks files in the session with status=processing and payslip_async_provider set.
        Triggers OpenAI vision extraction if not yet started or retries pending extractions.
        Returns { reconciled, stillPending, failed }. Members can only reconcile sessions they created.
      security: [{ bearerAuth: [] }]
  /imports/sessions/{sessionId}/parse:
    post:
      tags: [imports]
      summary: Parse staged files — members restricted to own sessions
      security: [{ bearerAuth: [] }]
  /imports/sessions/{sessionId}/canonicalize:
    post:
      tags: [imports]
      summary: Canonicalize into ledger
      description: >
        Maps transaction_raw rows for the session into transaction_canonical.
        Returns { inserted, duplicates, skipped, nearDuplicates }.
        `duplicates` counts rows inserted with status='duplicate' (exact fingerprint/FITID match against
        existing posted rows from a previous import) plus in-session skips. Exact duplicates surface in
        GET /transactions?needsReview=true with reviewReason "Exact duplicate".
        `nearDuplicates` counts rows skipped (not inserted) that have a duplicate_ambiguity resolution_item.
      security: [{ bearerAuth: [] }]
  /imports/sessions/{sessionId}/undo-import:
    post:
      tags: [imports]
      summary: Roll back session ledger effects — members restricted to own sessions
      description: >
        Removes canonical ledger rows and related resolution items tied to this import session.
        This operation is allowed regardless of session status (created, processing, review, finalized, failed).
        Returns 200 even when there is nothing to remove.
      responses:
        "200":
          description: Undo completed
        "404":
          description: Import session not found for household
      security: [{ bearerAuth: [] }]
  /transactions:
    get:
      tags: [transactions]
      summary: List ledger transactions (filters via query params)
      security: [{ bearerAuth: [] }]
    post:
      tags: [transactions]
      summary: Manual transaction entry — members restricted to accounts they own
      description: Members may only create transactions on accounts where owner_person_profile_id matches their profile.
      security: [{ bearerAuth: [] }]
  /transactions/{transactionId}:
    patch:
      tags: [transactions]
      summary: Update category / status / memo — members restricted to own transactions
      description: >
        Members may only update transactions they own (owner_person_profile_id).
        ownerScope/ownerPersonProfileId fields are ignored for member requests (ownership reassignment is owner/admin only).
      security: [{ bearerAuth: [] }]
    delete:
      tags: [transactions]
      summary: Hard-delete transaction (must be trashed first) — members restricted to own transactions
      security: [{ bearerAuth: [] }]
  /transactions/{transactionId}/open-review:
    get:
      tags: [transactions]
      summary: Open resolution items for a transaction
      security: [{ bearerAuth: [] }]
  /transactions/bulk-category:
    post:
      tags: [transactions]
      summary: Bulk set category on up to 200 transactions. Members restricted to own transactions (skippedNotOwned).
      security: [{ bearerAuth: [] }]
  /transactions/bulk-trash:
    post:
      tags: [transactions]
      summary: Bulk soft-delete (trash) up to 500 transactions. Members restricted to own transactions (skippedNotOwned).
      security: [{ bearerAuth: [] }]
  /transactions/bulk-restore:
    post:
      tags: [transactions]
      summary: Bulk restore up to 500 trashed transactions. Members restricted to own transactions (skippedNotOwned).
      security: [{ bearerAuth: [] }]
  /transactions/bulk-delete:
    post:
      tags: [transactions]
      summary: Bulk hard-delete up to 500 trashed transactions. Members restricted to own transactions (skippedNotOwned).
      security: [{ bearerAuth: [] }]
  /transactions/bulk-reassign-owner:
    post:
      tags: [transactions]
      summary: Reassign all transactions from one person profile to another — owner/admin only.
      security: [{ bearerAuth: [] }]
  /resolution:
    get:
      tags: [resolution]
      summary: List resolution items (query status, type)
      security: [{ bearerAuth: [] }]
  /resolution/bulk:
    post:
      tags: [resolution]
      summary: Bulk update resolution item status
      description: >
        Applies one target status to many resolution items (best-effort).
        Side effect (CR-080): when status='resolved' and item type='duplicate_ambiguity',
        any linked transaction_canonical with status='duplicate' is promoted to status='posted'
        (with a fresh fingerprint so the original dedup key is preserved).
      security: [{ bearerAuth: [] }]
  /resolution/{id}:
    patch:
      tags: [resolution]
      summary: Update resolution item status
      description: >
        Updates one resolution item status.
        Side effect (CR-080): when status='resolved' and item type='duplicate_ambiguity',
        any linked transaction_canonical with status='duplicate' is promoted to status='posted'.
      security: [{ bearerAuth: [] }]
  /resolution/bulk-apply-category:
    post:
      tags: [resolution]
      summary: Bulk apply category to unknown-category items (by explicit item IDs)
      security: [{ bearerAuth: [] }]
  /resolution/pattern-preview:
    post:
      tags: [resolution]
      summary: Preview count of open unknown-category items matching a description pattern
      description: >
        Returns the count of open unknown_category resolution items whose linked transaction
        description contains descriptionPattern (case-insensitive). Also returns up to 5 example descriptions.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [descriptionPattern]
              properties:
                descriptionPattern:
                  type: string
                  minLength: 1
                  maxLength: 200
      responses:
        '200':
          description: Match preview
          content:
            application/json:
              schema:
                type: object
                properties:
                  matched:
                    type: integer
                  descriptions:
                    type: array
                    items:
                      type: string
  /resolution/bulk-apply-by-pattern:
    post:
      tags: [resolution]
      summary: Apply category to all open unknown-category items matching a description pattern
      description: >
        Finds all open unknown_category resolution items whose linked transaction description
        contains descriptionPattern (case-insensitive), sets categoryId on each transaction,
        and marks each resolution item resolved.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [descriptionPattern, categoryId]
              properties:
                descriptionPattern:
                  type: string
                  minLength: 1
                  maxLength: 200
                categoryId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Number of items updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
        '400':
          description: Invalid category or payload
  /resolution/summary:
    get:
      tags: [resolution]
      summary: Resolution queue summary counts
      security: [{ bearerAuth: [] }]
  /reports/cash-summary:
    get:
      tags: [reports]
      summary: Cash summary / KPIs
      security: [{ bearerAuth: [] }]
  /reports/balance-sheet:
    get:
      tags: [reports]
      summary: Balance sheet / net worth snapshot (optional ownerScope filters by account belongs-to)
      description: >-
        Assets: checking, savings, investment, retirement. Liabilities: credit_card, loan, mortgage.
        Liability balances stored as positive magnitudes (what you owe); netWorth = assetSum − liabilitySum.
        Statement-ending balances auto-persisted from bank parsers (OFX, BoA CSV/PDF, Marcus PDF, Wealthfront PDF).
      security: [{ bearerAuth: [] }]
  /reports/balance-sheet/history:
    get:
      tags: [reports]
      summary: Balance sheet totals over time (interval=month|quarter|week|day; optional ownerScope; optional accountIds for per-point account slices; max 120 samples)
      security: [{ bearerAuth: [] }]
  /reports/balance-sheet/manual:
    post:
      tags: [reports]
      summary: Upsert manual account balance snapshot
      security: [{ bearerAuth: [] }]
  /reports/balance-sheet/manual/{id}:
    patch:
      tags: [reports]
      summary: Update manual balance snapshot amount/currency
      security: [{ bearerAuth: [] }]
  /payslips:
    get:
      tags: [payslips]
      summary: List payslips
      security: [{ bearerAuth: [] }]
  /payslips/upload:
    post:
      tags: [payslips]
      summary: Upload payslip PDF
      security: [{ bearerAuth: [] }]
  /payslips/manual:
    post:
      tags: [payslips]
      summary: Create payslip from manual summary (synthetic checksum; file name Manual entry)
      description: |
        At least one of `payDate`, `grossPayCurrent`, or `netPayCurrent` is required.
        Optional `lineItems` array accepted — each item cascades into the matching summary column on save (CR-117).
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                employerId:
                  type: string
                  nullable: true
                parserProfileId:
                  type: string
                  nullable: true
                ownerScope:
                  type: string
                  enum: [household, person]
                ownerPersonProfileId:
                  type: string
                  nullable: true
                payPeriodStart:
                  type: string
                  nullable: true
                payPeriodEnd:
                  type: string
                  nullable: true
                payDate:
                  type: string
                  nullable: true
                grossPayCurrent:
                  type: number
                  nullable: true
                grossPayYtd:
                  type: number
                  nullable: true
                employeeTaxesCurrent:
                  type: number
                  nullable: true
                employeeTaxesYtd:
                  type: number
                  nullable: true
                preTaxDeductionsCurrent:
                  type: number
                  nullable: true
                preTaxDeductionsYtd:
                  type: number
                  nullable: true
                postTaxDeductionsCurrent:
                  type: number
                  nullable: true
                postTaxDeductionsYtd:
                  type: number
                  nullable: true
                netPayCurrent:
                  type: number
                  nullable: true
                netPayYtd:
                  type: number
                  nullable: true
                hoursOrDaysCurrent:
                  type: string
                  nullable: true
                hoursOrDaysYtd:
                  type: string
                  nullable: true
                  description: Hours/days worked YTD (CR-072)
                taxableEarningsCurrent:
                  type: number
                  nullable: true
                  description: Taxable earnings current period (CR-072)
                taxableEarningsYtd:
                  type: number
                  nullable: true
                  description: Taxable earnings YTD (CR-072)
                otherInformationCurrent:
                  type: number
                  nullable: true
                  description: Other information section total current period (CR-072)
                otherInformationYtd:
                  type: number
                  nullable: true
                  description: Other information section total YTD (CR-072)
                employmentRate:
                  type: number
                  nullable: true
                  description: Salary or hourly rate (CR-072)
                employmentRateType:
                  type: string
                  nullable: true
                  description: "Rate type: annual, biweekly, or hourly (CR-072)"
                lineItems:
                  type: array
                  maxItems: 200
                  description: Optional individual line item rows (CR-117)
                  items:
                    $ref: '#/components/schemas/LineItemInput'
      responses:
        "201":
          description: Payslip created; returns snapshot + validationWarnings
          content:
            application/json:
              schema:
                type: object
                properties:
                  snapshot: { $ref: '#/components/schemas/PayslipSnapshotSummary' }
                  validationWarnings:
                    type: array
                    items: { $ref: '#/components/schemas/ValidationWarning' }
        "400":
          description: Validation error (missing required field combination or invalid body)
        "409":
          description: Duplicate checksum — identical manual entry already exists
  /payslips/sniff:
    post:
      tags: [payslips]
      summary: Sniff PDF for parser hints
      security: [{ bearerAuth: [] }]
  /payslips/{id}:
    get:
      tags: [payslips]
      summary: Payslip detail (includes matchedDeposits and lineItems — CR-068, CR-072)
      description: |
        Returns the full payslip snapshot plus:
        - `matchedDeposits`: up to 5 credit transactions within ±3 days / 1% of net pay on salary deposit account (CR-068)
        - `lineItems`: per-row earnings/deduction/tax items grouped by section (CR-072)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payslip detail with line items and matched deposit
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  householdId: { type: string }
                  fileName: { type: string }
                  fileChecksum: { type: string }
                  parserProfileId: { type: string }
                  employerId: { type: string, nullable: true }
                  ownerScope: { type: string, enum: [household, person] }
                  ownerPersonProfileId: { type: string, nullable: true }
                  importFileId: { type: string, nullable: true }
                  payPeriodStart: { type: string, nullable: true }
                  payPeriodEnd: { type: string, nullable: true }
                  payDate: { type: string, nullable: true }
                  grossPayCurrent: { type: number, nullable: true }
                  grossPayYtd: { type: number, nullable: true }
                  employeeTaxesCurrent: { type: number, nullable: true }
                  employeeTaxesYtd: { type: number, nullable: true }
                  preTaxDeductionsCurrent: { type: number, nullable: true }
                  preTaxDeductionsYtd: { type: number, nullable: true }
                  postTaxDeductionsCurrent: { type: number, nullable: true }
                  postTaxDeductionsYtd: { type: number, nullable: true }
                  netPayCurrent: { type: number, nullable: true }
                  netPayYtd: { type: number, nullable: true }
                  hoursOrDaysCurrent: { type: string, nullable: true }
                  hoursOrDaysYtd: { type: string, nullable: true, description: "Hours/days worked YTD (CR-072)" }
                  taxableEarningsCurrent: { type: number, nullable: true, description: "Taxable earnings current (CR-072)" }
                  taxableEarningsYtd: { type: number, nullable: true, description: "Taxable earnings YTD (CR-072)" }
                  otherInformationCurrent: { type: number, nullable: true, description: "Other information total current (CR-072)" }
                  otherInformationYtd: { type: number, nullable: true, description: "Other information total YTD (CR-072)" }
                  employmentRate: { type: number, nullable: true, description: "Salary or rate (CR-072)" }
                  employmentRateType: { type: string, nullable: true, description: "annual | biweekly | hourly (CR-072)" }
                  rawExtractJson: { type: object }
                  createdAt: { type: string }
                  matchedDeposits:
                    type: array
                    description: Credit transactions within ±3 days / 1% of net pay (CR-068)
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        txnDate: { type: string }
                        amount: { type: number }
                        direction: { type: string }
                        merchant: { type: string, nullable: true }
                        memo: { type: string, nullable: true }
                        accountId: { type: string }
                        institution: { type: string }
                        accountType: { type: string }
                        accountMask: { type: string, nullable: true }
                  lineItems:
                    type: object
                    description: Per-row line items grouped by section (CR-072)
                    properties:
                      earnings:
                        type: array
                        items: { $ref: '#/components/schemas/PayslipLineItem' }
                      pre_tax_deductions:
                        type: array
                        items: { $ref: '#/components/schemas/PayslipLineItem' }
                      post_tax_deductions:
                        type: array
                        items: { $ref: '#/components/schemas/PayslipLineItem' }
                      tax_deductions:
                        type: array
                        items: { $ref: '#/components/schemas/PayslipLineItem' }
                      other_deductions:
                        type: array
                        items: { $ref: '#/components/schemas/PayslipLineItem' }
                      other_information:
                        type: array
                        items: { $ref: '#/components/schemas/PayslipLineItem' }
                      taxable_earnings:
                        type: array
                        items: { $ref: '#/components/schemas/PayslipLineItem' }
                  validationWarnings:
                    type: array
                    description: Cross-validation results between line item sums and summary columns (CR-117)
                    items: { $ref: '#/components/schemas/ValidationWarning' }
        "404":
          description: Payslip not found or not owned by this household
    patch:
      tags: [payslips]
      summary: Update payslip summary amounts
      description: Returns `validationWarnings` alongside updated snapshot (CR-117).
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Updated snapshot + validation warnings
          content:
            application/json:
              schema:
                type: object
                properties:
                  snapshot: { $ref: '#/components/schemas/PayslipSnapshotSummary' }
                  validationWarnings:
                    type: array
                    items: { $ref: '#/components/schemas/ValidationWarning' }
        "404":
          description: Payslip not found
    delete:
      tags: [payslips]
      summary: Delete payslip snapshot (cascades to line items)
      security: [{ bearerAuth: [] }]
  /payslips/{id}/line-items:
    post:
      tags: [payslips]
      summary: Add a line item to an existing payslip (CR-117)
      description: |
        Inserts a new row and cascades: re-sums the affected section and updates the matching
        summary column on `payslip_snapshot`. Returns updated snapshot + all line items + validation warnings.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LineItemInput' }
      responses:
        "201":
          description: Line item added; returns mutation result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LineItemMutationResult' }
        "400":
          description: Invalid body
        "404":
          description: Payslip not found
  /payslips/{id}/line-items/{itemId}:
    patch:
      tags: [payslips]
      summary: Edit a single line item (CR-117)
      description: |
        Updates name, authority, amounts, hours, or rate. Cascades to summary column.
        Returns updated snapshot + all line items + validation warnings.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: itemId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, nullable: true }
                authority: { type: string, nullable: true }
                amountCurrent: { type: number, nullable: true }
                amountYtd: { type: number, nullable: true }
                hoursOrDaysCurrent: { type: number, nullable: true }
                hoursOrDaysYtd: { type: number, nullable: true }
                rate: { type: number, nullable: true }
      responses:
        "200":
          description: Updated snapshot + line items + validation warnings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LineItemMutationResult' }
        "400":
          description: Invalid body
        "404":
          description: Line item not found or not owned by this household
    delete:
      tags: [payslips]
      summary: Delete a single line item (CR-117)
      description: |
        Hard-deletes the row. Cascades to summary column (re-sums remaining items in section).
        Returns updated snapshot + all line items + validation warnings.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: itemId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deletion confirmed; returns updated mutation result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LineItemMutationResult' }
        "404":
          description: Line item not found or not owned by this household
  /exports/household/import:
    post:
      tags: [exports]
      summary: Restore household from exported .hfb backup (async, destructive)
      description: |
        `multipart/form-data` with field **`file`** (`.hfb` only). Queues **wipe-then-restore** for the
        authenticated household. Poll **`GET /exports/import/{jobId}`** until `status` is terminal.
        Successful restore increments **`app_user.token_version`** (all JWTs for that household’s users
        become invalid). Max upload **500 MB**. Bundle format **`exportVersion` 4** (manifest + one JSON
        per table); v1/v2 monolithic bundles are still accepted. See `docs/API_EXPORTS.md`.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: .hfb backup produced by export job download
      responses:
        "202":
          description: Restore job accepted; poll import job status
          content:
            application/json:
              schema:
                type: object
                required: [jobId, message]
                properties:
                  jobId:
                    type: string
                  message:
                    type: string
        "400":
          description: Missing `file` field or not a `.hfb`
        "413":
          description: File exceeds upload limit (500 MB)
  /exports/preview:
    post:
      tags: [exports]
      summary: Preview .hfb backup contents before restore (read-only)
      description: |
        `multipart/form-data` with field **`file`** (`.hfb` only). Reads manifest metadata and table row counts,
        decrypting with `BACKUP_ENCRYPTION_KEY` when needed. Does not query or modify database tables.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: .hfb backup produced by export job download
      responses:
        "200":
          description: Preview summary from backup manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupPreviewResponse'
        "400":
          description: Missing file, invalid extension, unsupported version, or unreadable backup
        "422":
          description: Backup is encrypted but BACKUP_ENCRYPTION_KEY is not configured
  /exports/import/{jobId}:
    get:
      tags: [exports]
      summary: Restore (import) job status
      security: [{ bearerAuth: [] }]
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job record (status, optional error and per-table stats when complete)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                  createdAt:
                    type: string
                  completedAt:
                    type: string
                    nullable: true
                  error:
                    type: string
                    nullable: true
                  stats:
                    type: object
                    additionalProperties:
                      type: integer
                    nullable: true
        "400":
          description: Missing job id
        "404":
          description: Import job not found for this household
  /exports/household:
    post:
      tags: [exports]
      summary: Queue asynchronous household .hfb export
      security: [{ bearerAuth: [] }]
      responses:
        "202":
          description: Job accepted; poll job status then download
        "429":
          description: Too many exports in the rolling window
  /exports/{jobId}/download:
    get:
      tags: [exports]
      summary: Download completed export .hfb backup
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Binary download (`household-export-{jobId}.hfb`)
        "404":
          description: Job not ready, file missing, or job not found
        "410":
          description: Export expired — backup file was auto-deleted after 48-hour retention window (EXPORT_EXPIRED)
  /exports/{jobId}:
    get:
      tags: [exports]
      summary: Export job status
      security: [{ bearerAuth: [] }]
  /budget/suggest:
    get:
      tags: [budget]
      summary: Budget suggestions for a month (pre-populated from recent spend)
      description: >-
        Returns suggested budget amounts for each category based on the most recent
        calendar month with categorised debit activity (anchor month). Categories
        excluded: Transfers, Income, Investments. Results sorted by anchor-month spend
        descending. `dataAsOf` is the YYYY-MM anchor used; null when no data in 24-month window.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
          description: YYYY-MM month to generate suggestions for
      responses:
        "200":
          description: Suggestions (may be empty when no data)
          content:
            application/json:
              schema:
                type: object
                properties:
                  month: { type: string }
                  dataAsOf: { type: string, nullable: true }
                  suggestions:
                    type: array
                    items:
                      type: object
                      properties:
                        categoryId: { type: string }
                        categoryName: { type: string }
                        parentId: { type: string, nullable: true }
                        parentName: { type: string, nullable: true }
                        suggestedAmount: { type: number }
                        basis: { type: string, enum: [last_month, three_month_avg] }
                        lastMonthActual: { type: number }
                        threeMonthAvg: { type: number }
        "400":
          description: month param missing or invalid format
  /budget/months:
    get:
      tags: [budget]
      summary: List months that have at least one budget entry (newest first)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Month list
          content:
            application/json:
              schema:
                type: object
                properties:
                  months:
                    type: array
                    items:
                      type: object
                      properties:
                        month: { type: string }
                        totalBudgeted: { type: number }
  /budget/{month}:
    get:
      tags: [budget]
      summary: Budget + actual spend for the given month
      description: >-
        Returns the saved budget for the month combined with actual debit spend.
        `exists: false` when no budget entries have been saved; UI shows setup form.
        Entries may be leaf-level or parent-level (parent-level entries roll up all child actuals).
        `summary.unbudgetedSpend` captures outflows not covered by any budget entry.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: month
          in: path
          required: true
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
      responses:
        "200":
          description: Budget with actuals
          content:
            application/json:
              schema:
                type: object
                properties:
                  month: { type: string }
                  exists: { type: boolean }
                  summary:
                    type: object
                    properties:
                      totalBudgeted: { type: number }
                      totalSpent: { type: number }
                      remaining: { type: number }
                      unbudgetedSpend: { type: number }
                  categories:
                    type: array
                    items:
                      type: object
                      properties:
                        categoryId: { type: string }
                        categoryName: { type: string }
                        parentName: { type: string, nullable: true }
                        budgeted: { type: number }
                        spent: { type: number }
                        remaining: { type: number }
                        percentUsed: { type: number }
        "400":
          description: month path param not YYYY-MM
    put:
      tags: [budget]
      summary: Replace entire budget for the month
      description: >-
        Full replace — deletes all existing entries for the month and inserts the provided set
        in a transaction. Passing an empty entries array clears the budget for that month.
        Returns the saved budget with actuals (same shape as GET /budget/:month).
      security: [{ bearerAuth: [] }]
      parameters:
        - name: month
          in: path
          required: true
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entries]
              properties:
                entries:
                  type: array
                  items:
                    type: object
                    required: [categoryId, amount]
                    properties:
                      categoryId:
                        type: string
                        format: uuid
                      amount:
                        type: number
                        minimum: 0
      responses:
        "200":
          description: Saved budget with actuals (same shape as GET /budget/:month)
        "400":
          description: Invalid month param or invalid body
  /recurring-overrides:
    get:
      tags: [recurring]
      summary: List recurring merchant overrides for household
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Overrides list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RecurringOverride'
        "401":
          description: Unauthorized
    post:
      tags: [recurring]
      summary: Upsert recurring merchant override (confirm or dismiss)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [merchantKey, verdict]
              properties:
                merchantKey:
                  type: string
                  minLength: 1
                displayName:
                  type: string
                verdict:
                  type: string
                  enum: [confirmed, dismissed]
                amountAnchor:
                  type: number
                amountTolerancePct:
                  type: number
                  default: 15
      responses:
        "200":
          description: Upserted override
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    $ref: '#/components/schemas/RecurringOverride'
        "400":
          description: Invalid request payload
        "401":
          description: Unauthorized
  /recurring-overrides/{id}:
    delete:
      tags: [recurring]
      summary: Delete recurring merchant override
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "401":
          description: Unauthorized
        "404":
          description: Override not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ExportBundleManifest:
      type: object
      description: Manifest JSON embedded in the exported .hfb backup payload.
      properties:
        exportVersion:
          type: integer
          example: 4
        exportedAt:
          type: string
          format: date-time
        householdId:
          type: string
          format: uuid
        format:
          type: string
          example: zip-split-v4
        encrypted:
          type: boolean
          example: true
        scope:
          type: string
          nullable: true
          example: household
        personProfileId:
          type: string
          format: uuid
          nullable: true
        tables:
          type: object
          additionalProperties:
            type: object
            properties:
              file:
                type: string
              rows:
                type: integer
          example:
            app_user: { file: app_user.json, rows: 2 }
            household: { file: household.json, rows: 1 }
            budget_category: { file: budget_category.json, rows: 3 }
            payslip_line_item: { file: payslip_line_item.json, rows: 6 }
            recurring_merchant_override: { file: recurring_merchant_override.json, rows: 1 }
            resolution_item: { file: resolution_item.json, rows: 4 }
            household_ai_insight: { file: household_ai_insight.json, rows: 2 }
    BackupPreviewResponse:
      type: object
      required: [exportVersion, exportedAt, encrypted, scope, format, tables, totalRows]
      properties:
        exportVersion:
          type: integer
          enum: [1, 2, 3, 4]
        exportedAt:
          type: string
        encrypted:
          type: boolean
        scope:
          type: string
          enum: [household, member]
        personProfileId:
          type: string
          nullable: true
        format:
          type: string
        tables:
          type: object
          additionalProperties:
            type: object
            required: [rows]
            properties:
              rows:
                type: integer
                minimum: 0
        totalRows:
          type: integer
          minimum: 0
    PayslipLineItem:
      type: object
      description: One row from a payslip earnings/deduction/tax section (CR-072)
      properties:
        id: { type: string }
        payslipSnapshotId: { type: string }
        householdId: { type: string }
        section:
          type: string
          enum: [earnings, pre_tax_deductions, post_tax_deductions, tax_deductions, other_deductions, other_information, taxable_earnings]
        sortOrder: { type: integer }
        name: { type: string, nullable: true }
        authority: { type: string, nullable: true }
        description: { type: string, nullable: true }
        dateStart: { type: string, nullable: true }
        dateEnd: { type: string, nullable: true }
        dateRaw: { type: string, nullable: true }
        hoursOrDaysCurrent: { type: number, nullable: true }
        hoursOrDaysYtd: { type: number, nullable: true }
        rate: { type: number, nullable: true }
        amountCurrent: { type: number, nullable: true }
        amountYtd: { type: number, nullable: true }
        rawSection: { type: string, nullable: true }
        createdAt: { type: string }
    ValidationWarning:
      type: object
      description: Cross-validation result from comparing line item sums to summary columns (CR-117)
      properties:
        code:
          type: string
          enum: [EARNINGS_SUM_MISMATCH, PRE_TAX_SUM_MISMATCH, TAX_SUM_MISMATCH, POST_TAX_SUM_MISMATCH, ARITHMETIC_IMBALANCE]
        lineItemSum: { type: number, nullable: true }
        summaryValue: { type: number, nullable: true }
        delta: { type: number, nullable: true }
        message: { type: string }
    LineItemInput:
      type: object
      description: Body for creating or adding a line item row (CR-117)
      required: [section]
      properties:
        section:
          type: string
          enum: [earnings, pre_tax_deductions, post_tax_deductions, tax_deductions, other_deductions, other_information, taxable_earnings]
        name: { type: string, nullable: true }
        authority: { type: string, nullable: true }
        amountCurrent: { type: number, nullable: true }
        amountYtd: { type: number, nullable: true }
        hoursOrDaysCurrent: { type: number, nullable: true }
        hoursOrDaysYtd: { type: number, nullable: true }
        rate: { type: number, nullable: true }
    PayslipSnapshotSummary:
      type: object
      description: Payslip snapshot row (summary columns; no lineItems or matchedDeposits)
      properties:
        id: { type: string }
        payDate: { type: string, nullable: true }
        grossPayCurrent: { type: number, nullable: true }
        netPayCurrent: { type: number, nullable: true }
    LineItemMutationResult:
      type: object
      description: Response from any line item create/edit/delete — includes updated snapshot, all items, and validation warnings (CR-117)
      properties:
        snapshot: { $ref: '#/components/schemas/PayslipSnapshotSummary' }
        lineItems:
          type: object
          description: All remaining line items grouped by section
        validationWarnings:
          type: array
          items: { $ref: '#/components/schemas/ValidationWarning' }
    RecurringOverride:
      type: object
      properties:
        id: { type: string, format: uuid }
        householdId: { type: string, format: uuid }
        merchantKey: { type: string }
        displayName: { type: string, nullable: true }
        verdict: { type: string, enum: [confirmed, dismissed] }
        amountAnchor: { type: number, nullable: true }
        amountTolerancePct: { type: number }
        taggedByUserId: { type: string, format: uuid, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    HouseholdSettings:
      type: object
      properties:
        monthlySavingsTargetUsd: { type: number, nullable: true }
        salaryDepositFinancialAccountId: { type: string, format: uuid, nullable: true }
        city: { type: string, nullable: true }
        state: { type: string, nullable: true }
        combinedGrossIncomeUsd: { type: number, nullable: true }
        employers:
          type: array
          items:
            type: object
    HouseholdSettingsPatch:
      type: object
      properties:
        monthlySavingsTargetUsd: { type: number, nullable: true }
        city: { type: string, nullable: true, maxLength: 100 }
        state: { type: string, nullable: true, maxLength: 100 }
        combinedGrossIncomeUsd: { type: number, nullable: true }
    HouseholdProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        householdId: { type: string, format: uuid }
        linkedUserId: { type: string, format: uuid, nullable: true }
        fullName: { type: string }
        email: { type: string, nullable: true }
        phoneNumber: { type: string, nullable: true }
        avatarKey: { type: string, nullable: true }
        role: { type: string, enum: [head, member] }
        relationship: { type: string, enum: [self, spouse, child, dependent, other] }
        age: { type: integer, nullable: true }
        sex: { type: string, nullable: true, enum: [male, female, nonbinary, prefer_not_to_say] }
        individualGrossIncomeUsd: { type: number, nullable: true }
        riskTolerance: { type: string, nullable: true, enum: [conservative, moderate, aggressive] }
        financialGoals:
          type: array
          items: { type: string }
    HouseholdProfilePatch:
      type: object
      properties:
        age: { type: integer, nullable: true, minimum: 1, maximum: 129 }
        sex: { type: string, nullable: true, enum: [male, female, nonbinary, prefer_not_to_say] }
        individualGrossIncomeUsd: { type: number, nullable: true }
        riskTolerance: { type: string, nullable: true, enum: [conservative, moderate, aggressive] }
        financialGoals:
          type: array
          items: { type: string }
    HouseholdMemberCreate:
      type: object
      required: [role, relationship]
      properties:
        firstName: { type: string, nullable: true }
        lastName: { type: string, nullable: true }
        fullName: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true }
        phoneNumber: { type: string, nullable: true }
        avatarKey: { type: string, nullable: true }
        role: { type: string, enum: [head, member] }
        relationship: { type: string, enum: [self, spouse, child, dependent, other] }
        createLogin: { type: boolean }
    HouseholdMemberPatch:
      type: object
      properties:
        firstName: { type: string }
        lastName: { type: string }
        fullName: { type: string }
        email: { type: string, format: email, nullable: true }
        phoneNumber: { type: string, nullable: true }
        avatarKey: { type: string, nullable: true }
        role: { type: string, enum: [head, member] }
        relationship: { type: string, enum: [self, spouse, child, dependent, other] }
    HouseholdMemberDataCount:
      type: object
      properties:
        transactions: { type: integer }
        payslips: { type: integer }
    InsightPayload:
      type: object
      properties:
        healthRating: { type: string, enum: [strong, on_track, needs_attention, at_risk] }
        healthRationale: { type: string }
        localBenchmark: { type: string }
        nationalBenchmark: { type: string }
        whatsWorking: { type: array, items: { type: string } }
        concerns: { type: array, items: { type: string } }
        spendingAnalysis: { type: array, items: { type: string } }
        investmentGaps: { type: array, items: { type: string } }
        nextSteps: { type: array, items: { type: string } }
    InsightRecord:
      type: object
      properties:
        id: { type: string, format: uuid }
        householdId: { type: string, format: uuid }
        scope: { type: string, enum: [household, personal] }
        userId: { type: string, format: uuid, nullable: true }
        generatedAt: { type: string, format: date-time }
        provider: { type: string }
        model: { type: string }
        promptVersion: { type: string }
        payload:
          $ref: '#/components/schemas/InsightPayload'
    InsightJob:
      type: object
      properties:
        id: { type: string, format: uuid }
        status: { type: string, enum: [queued, running, complete, failed] }
        insightId: { type: string, format: uuid, nullable: true }
        errorText: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time, nullable: true }
    ValidationErrorsResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            additionalProperties: true
    AuthResetInvalidTokenResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [INVALID_TOKEN]
        message:
          type: string
          example: This link has expired or already been used.
    AuthResetSameAsCurrentResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [SAME_AS_CURRENT]
        message:
          type: string
          example: New password must be different from your current password.
    GDriveConnectRequest:
      type: object
      required: [serviceAccountKeyJson, folderId]
      properties:
        serviceAccountKeyJson:
          type: string
          description: Full JSON contents of a Google Cloud service account key file
        folderId:
          type: string
          description: Google Drive folder ID from the folder URL
    GDriveStatusResponse:
      type: object
      required: [connected]
      properties:
        connected: { type: boolean }
        folderId: { type: string }
        folderName: { type: string, nullable: true }
        connectedAt: { type: string, format: date-time }
        connectedByUserId:
          type: string
          nullable: true
          description: User who connected; null if that app_user row was removed (ON DELETE SET NULL).
        lastVerifiedAt: { type: string, format: date-time, nullable: true }
        lastError: { type: string, nullable: true }
    GDriveConnectSuccessResponse:
      type: object
      required: [connected, folderId, folderName]
      properties:
        connected: { type: boolean, enum: [true] }
        folderId: { type: string }
        folderName: { type: string }
    GDriveInvalidKeyJsonResponse:
