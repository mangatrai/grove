<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grove — PT-1 Property Tax Protest Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; }
    button, input, select, textarea { font: inherit; }
    p, h1, h2, h3, h4 { margin: 0; }
    a { color: inherit; }
  </style>

  <!-- Data -->
  <script src="mock-pt1.js"></script>

  <!-- Design Canvas -->
  <script type="text/babel" src="design-canvas.jsx"></script>

  <!-- Shared components (exports to window) -->
  <script type="text/babel" src="shared-pt1.jsx"></script>

  <!-- Views (each exports to window) -->
  <script type="text/babel" src="pt1-view-a.jsx"></script>
  <script type="text/babel" src="pt1-view-b.jsx"></script>
  <script type="text/babel" src="pt1-view-c.jsx"></script>
  <script type="text/babel" src="pt1-details.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas title="Grove · PT-1 Property Tax Protest Assistant">

          <DCSection id="full" title="Full Worksheet — Layout Variations">
            <DCArtboard id="full-a" label="A — Evidence File (Conservative)" width={1200} height={1680}>
              <ViewA />
            </DCArtboard>
            <DCArtboard id="full-b" label="B — Strategy Dashboard (Modern)" width={1200} height={1600}>
              <ViewB />
            </DCArtboard>
            <DCArtboard id="full-c" label="C — Analyst Workbench (Dense)" width={1200} height={1680}>
              <ViewC />
            </DCArtboard>
          </DCSection>

          <DCSection id="evidence" title="Evidence Sections — Detail">
            <DCArtboard id="ev-market" label="Market Value Comps Table" width={1060} height={520}>
              <EVMarket />
            </DCArtboard>
            <DCArtboard id="ev-unequal" label="Unequal Appraisal — Rate Comparison" width={1060} height={520}>
              <EVUnequal />
            </DCArtboard>
          </DCSection>

          <DCSection id="llm" title="AI Strategy Panel">
            <DCArtboard id="llm-output" label="Generated Strategy Output" width={780} height={640}>
              <LLMDetail />
            </DCArtboard>
            <DCArtboard id="tracker-detail" label="Protest Tracker · 2026 + History" width={780} height={380}>
              <TrackerDetail />
            </DCArtboard>
          </DCSection>

          <DCSection id="export" title="PDF Evidence Packet Preview">
            <DCArtboard id="pdf-preview" label="Evidence Packet — Cover Page (PDF p.1)" width={620} height={820}>
              <PDFPreview />
            </DCArtboard>
          </DCSection>

        </DesignCanvas>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
