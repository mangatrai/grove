# Local Postgres for dev (matches managed Postgres major version in use).
# Start: `docker compose up -d` from repo root; point `.env` at localhost:5433, DATABASE_SSL=0.
#
# Image: pgvector/pgvector:pg18 — Postgres 18 with the pgvector extension pre-installed.
# Pulled from Docker Hub directly (GCR mirror only covers official library images).
# Fallback if pg18 tag is unavailable: build a custom image (see below) or use pgvector/pgvector:pg17.
#
# Data persistence (Postgres 18+ images): mount the *parent* directory only — see docker-library/postgres#1259.
# - Named volume `hf_pg_data` survives restarts; survives `docker compose down` (no -v).
# - Remove with: `docker compose down -v` (deletes the named volume).
# - If you previously used PG ≤16 images with `.../data`, run `docker compose down -v` once, then `up -d`,
#   so the volume is recreated for 18+ layout (dev DB only; dump first if you need the data).
# - Bind mount example: `./data/postgres:/var/lib/postgresql`
services:
  postgres:
    image: pgvector/pgvector:pg18
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: household
      POSTGRES_PASSWORD: household
      POSTGRES_DB: household_finance_test
    volumes:
      - hf_pg_data:/var/lib/postgresql

volumes:
  hf_pg_data:
